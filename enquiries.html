    <main>
        <main class="form-container fade-in">
        <!-- SECTION 4.1: Form ID and Explicit Submission Attributes -->
        <form class="enquiry-form" id="enquiryForm" action="https://jsonplaceholder.typicode.com/posts" method="POST">
            
            <h2>Enquiry Form</h2>

            <!-- Dynamic Error Feedback Boxes (Section 4.1 JavaScript Client-Side Validation validation targets) -->
            <div id="enquiryError" style="color: #ff3333; font-weight: bold; margin-bottom: 15px; display: none; text-align: center;"></div>
            <div id="enquirySuccess" style="color: #2baf2b; font-weight: bold; margin-bottom: 15px; display: none; text-align: center;"></div>

            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required minlength="2">
            </div>

            <div class="form-group">
                <label for="surname">Surname:</label>
                <input type="text" id="surname" name="surname" placeholder="Enter your surname" required minlength="2">
            </div>

            <!--Email Address validation criteria -->
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="example@domain.com" required>
            </div>

            <!--Phone structure (Exactly 10 numerical characters) -->
            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="e.g. 0821234567" required pattern="[0-9]{10}">
            </div>

            <!--Date matching requirements -->
            <div class="form-group">
                <label for="eventDate">Date of Event:</label>
                <input type="date" id="eventDate" name="eventDate" required>
            </div>

            <div class="form-group">
                <label for="reason">Reason / Event Type:</label>
                <select name="reason" id="reason">
                    <option value="Birthday">Birthday</option>
                    <option value="Wedding">Wedding</option>
                    <option value="clothes">clothes</option>
                </select>
            </div>

            <div class="form-group">
                <label for="details">Order Details:</label>
                <textarea id="details" name="details" placeholder="Tell us more about your order..." rows="5" required></textarea>
            </div>

            <button type="submit">Submit Enquiry</button>
        </form>
    </main>
